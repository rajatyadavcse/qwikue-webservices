# =============================================================================
#  LOCAL DEVELOPMENT PROFILE
# =============================================================================
#
#  Activate this profile with ONE of these options (never commit that change):
#
#  IntelliJ IDEA:
#    Run → Edit Configurations → VM options: -Dspring.profiles.active=local
#    (or set Active profiles field to "local")
#
#  Maven command line:
#    mvn spring-boot:run -Dspring-boot.run.profiles=local
#
#  Gradle command line:
#    ./gradlew bootRun --args='--spring.profiles.active=local'
#
#  VS Code launch.json:
#    "vmArgs": "-Dspring.profiles.active=local"
# =============================================================================

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8086
server.forward-headers-strategy=native

# ── Datasource ────────────────────────────────────────────────────────────────
# Using the same Supabase database as production for simplicity.
#
# To use a local PostgreSQL instead, replace with:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=identity
#   spring.datasource.username=postgres
#   spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require&currentSchema=identity
spring.datasource.username=postgres.iglezaprcevbzjldkutb
spring.datasource.password=MLshZRv51jdYvLhF

# Smaller pool for local dev — no need to hold many connections
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update

# ── Application Base URL ──────────────────────────────────────────────────────
# Swagger "Try it out" calls will target localhost
app.base-url=http://localhost:8086

# ── CORS ──────────────────────────────────────────────────────────────────────
# Allows the local React dev server (default Vite/CRA port).
# Change to http://localhost:5173 if using Vite.
cors.allowed-origins=*

# ── Refresh-Token Cookie ──────────────────────────────────────────────────────
# Secure=false  — no HTTPS on localhost, so the cookie can be sent over HTTP.
# SameSite=Lax  — React (localhost:3000) and API (localhost:8086) are same-site
#                 (same hostname, different ports), so Lax works correctly.
#                 Do NOT use SameSite=None without Secure=true — browsers block it.
app.cookie.secure=false
app.cookie.same-site=Lax
