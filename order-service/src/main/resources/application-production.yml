# URL of the restaurant-service — override via environment variable APP_RESTAURANT_SERVICE_BASE_URL on the platform
app:
  restaurant-service:
    base-url:  # override via env var on platform
  payment-sweeper:
    enabled: false
  # ── Keep-Alive Scheduler (Render free-tier anti-sleep) ───────────────────────
  # Render's free tier spins down a service after 15 minutes of inactivity.
  # This cron job fires a lightweight DB query every 10 minutes so the JVM
  # process is never idle long enough for Render to put it to sleep.
  keep-alive:
    cron: "0 0/10 * * * *"
