spring:
  application:
    name: order-service
  jackson:
    time-zone: Asia/Kolkata
  # Default to 'production' profile — no need to set anything on the deployment platform
  profiles:
    active: production
  jpa:
    open-in-view: false          # release Hibernate session after transaction, not after HTTP response
    hibernate:
      ddl-auto: validate         # safer than update; no schema-diff kept in memory at startup
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          batch_size: 20         # batch inserts/updates to reduce object graph overhead
        order_inserts: true
        order_updates: true

server:
  port: 8084
  forward-headers-strategy: native  # trust X-Forwarded-* headers from Railway/Render/Heroku reverse proxies

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized  # don't expose full details to unauthenticated requests
  info:
    env:
      enabled: true

info:
  app:
    name: Order Service
    description: RESTful API for managing orders in the kitchen-ordering system
    version: 1.0.0

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_mockKeyId}
  key-secret: ${RAZORPAY_KEY_SECRET:mockKeySecret}
  platform-commission-percentage: ${RAZORPAY_COMMISSION_PERCENTAGE:10.0}