spring.application.name=identity-service

# ── Default Profile ────────────────────────────────────────────────────────────
# 'prod' is the default — deploying to any platform without extra config runs production settings.
# To run locally: add VM option  -Dspring.profiles.active=local
#                 or Maven flag  -Dspring-boot.run.profiles=local
spring.profiles.default=prod

# ── JPA Platform (shared across all profiles) ──────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_schema=identity

# ── JWT (shared across all profiles) ──────────────────────────────────────────
# Base64-encoded 256-bit secret key
jwt.secret=aWRlbnRpdHktc2VydmljZS1zZWNyZXQta2V5LTMyYnl0ZQ==
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# ── Swagger / OpenAPI (shared across all profiles) ────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.default-produces-media-type=application/json
springdoc.remove-broken-reference-definitions=false

# ── Mail (SMTP) ──────────────────────────────────────────────────────────
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD as env vars on Railway.
# For local dev with Gmail: use App Password (2FA must be on). Port 587 + STARTTLS.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Fail fast — don't block a thread indefinitely when SMTP is unreachable
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ── OTP Settings ───────────────────────────────────────────────────────
# Email verification OTP expires after 5 minutes
app.otp.expiry-minutes=5
# Password reset OTP expires after 15 minutes
app.otp.reset-expiry-minutes=15
