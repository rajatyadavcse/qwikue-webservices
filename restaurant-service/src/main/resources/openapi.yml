openapi: 3.0.3
info:
  title: Restaurant Service API
  description: |
    RESTful API for managing restaurants and their menu items.
    
    This service provides CRUD operations for:
    - **Restaurants** — Create, retrieve, update, and delete restaurant profiles.
    - **Menus** — Create, retrieve (by restaurant), update, and delete menu items.
  version: 1.0.0
  contact:
    name: Restaurant Service Team
    email: support@restaurant-service.com

servers:
  - url: http://localhost:8087
    description: Local Development Server
  - url: https://staging-api.restaurant-service.com
    description: Staging Server
  - url: https://api.restaurant-service.com
    description: Production Server

tags:
  - name: Restaurant
    description: Operations for managing restaurants
  - name: Menu
    description: Operations for managing menu items
  - name: OrderEntity
    description: Operations for managing order entities (Tables, Rooms, Beds)

paths:
  # =========================================================================
  # Restaurant Endpoints
  # =========================================================================
  /restaurants:
    post:
      tags:
        - Restaurant
      summary: Create a new restaurant
      description: Creates a new restaurant profile with the provided details.
      operationId: createRestaurant
      requestBody:
        description: Restaurant object to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantRequest'
            example:
              restaurantName: "The Grand Kitchen"
              gstin: "07AAAAA1111A1Z1"
              address:
                addressLine1: "123 Main Street"
                addressLine2: "Suite 100"
                landmark: "Near Central Park"
                city: "New York"
                state: "NY"
                country: "USA"
                pincode: "10001"
              phoneNo: "+1-555-123-4567"
              status: "ACTIVE"
              email: "info@grandkitchen.com"
              type: "FINE_DINING"
      responses:
        '201':
          description: Restaurant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Restaurant
      summary: Get all restaurants
      description: Retrieves a list of all registered restaurants.
      operationId: getAllRestaurants
      responses:
        '200':
          description: Successfully retrieved the list of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Restaurant'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{id}:
    get:
      tags:
        - Restaurant
      summary: Get restaurant by ID
      description: Retrieves a single restaurant by its unique identifier.
      operationId: getRestaurantById
      parameters:
        - name: id
          in: path
          description: Unique identifier of the restaurant
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Successfully retrieved the restaurant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-04-03T12:00:00"
                status: 404
                error: "Not Found"
                message: "Restaurant not found with id: 1"
                path: "/restaurants/1"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Restaurant
      summary: Update an existing restaurant
      description: Updates the restaurant identified by the given ID with the provided data.
      operationId: updateRestaurant
      parameters:
        - name: id
          in: path
          description: Unique identifier of the restaurant to update
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        description: Updated restaurant data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantRequest'
            example:
              restaurantName: "The Grand Kitchen (Updated)"
              gstin: "07AAAAA1111A1Z1"
              address:
                addressLine1: "456 Broadway"
                addressLine2: "Apt 2B"
                landmark: "Times Square"
                city: "New York"
                state: "NY"
                country: "USA"
                pincode: "10002"
              phoneNo: "+1-555-987-6543"
              status: "ACTIVE"
              email: "updated@grandkitchen.com"
              type: "CASUAL_DINING"
      responses:
        '200':
          description: Restaurant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Restaurant
      summary: Delete a restaurant
      description: Deletes the restaurant identified by the given ID.
      operationId: deleteRestaurant
      parameters:
        - name: id
          in: path
          description: Unique identifier of the restaurant to delete
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '204':
          description: Restaurant deleted successfully (no content)
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # Menu Endpoints
  # =========================================================================
  /menu:
    post:
      tags:
        - Menu
      summary: Create a new menu item
      description: Creates a new menu item associated with a restaurant.
      operationId: createMenu
      requestBody:
        description: Menu item to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuRequest'
            example:
              restaurantId: 1
              itemName: "Margherita Pizza"
              description: "Classic pizza with fresh mozzarella, tomato sauce, and basil"
              price: 14.99
              category: "PIZZA"
              isAvailable: true
      responses:
        '201':
          description: Menu item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Menu
      summary: Get menu items by restaurant ID
      description: Retrieves all menu items belonging to a specific restaurant.
      operationId: getMenuByRestaurantId
      parameters:
        - name: restaurantId
          in: query
          description: ID of the restaurant whose menu items to retrieve
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Successfully retrieved menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Menu'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /menu/{id}:
    get:
      tags:
        - Menu
      summary: Get menu item by ID
      description: Retrieves a single menu item by its unique identifier.
      operationId: getMenuById
      parameters:
        - name: id
          in: path
          description: Unique identifier of the menu item
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Successfully retrieved the menu item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          description: Menu item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-04-03T12:00:00"
                status: 404
                error: "Not Found"
                message: "Menu not found with id: 1"
                path: "/menu/1"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Menu
      summary: Update a menu item
      description: Updates the menu item identified by the given ID.
      operationId: updateMenu
      parameters:
        - name: id
          in: path
          description: Unique identifier of the menu item to update
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        description: Updated menu item data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuRequest'
            example:
              restaurantId: 1
              itemName: "Margherita Pizza (Large)"
              description: "Large classic pizza with fresh mozzarella, tomato sauce, and basil"
              price: 18.99
              category: "PIZZA"
              isAvailable: true
      responses:
        '200':
          description: Menu item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Menu item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Menu
      summary: Delete a menu item
      description: Deletes the menu item identified by the given ID.
      operationId: deleteMenu
      parameters:
        - name: id
          in: path
          description: Unique identifier of the menu item to delete
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '204':
          description: Menu item deleted successfully (no content)
        '404':
          description: Menu item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # Order Entity Endpoints
  # =========================================================================
  /entities:
    post:
      tags:
        - OrderEntity
      summary: Create a new order entity
      description: Creates a new order entity (e.g. Table, Room, Bed) for a restaurant.
      operationId: createOrderEntity
      requestBody:
        description: Order entity to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderEntityRequest'
      responses:
        '201':
          description: Order entity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEntity'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - OrderEntity
      summary: Get all order entities by restaurant ID
      description: Retrieves all order entities (e.g. Tables, Rooms, Beds) for a specific restaurant.
      operationId: getOrderEntitiesByRestaurantId
      parameters:
        - name: restaurantId
          in: query
          description: ID of the restaurant
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Successfully retrieved order entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderEntity'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - OrderEntity
      summary: Update an existing order entity
      description: Updates the order entity details.
      operationId: updateOrderEntity
      requestBody:
        description: Updated order entity data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderEntityRequest'
      responses:
        '200':
          description: Order entity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEntity'
        '404':
          description: Order entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /entities/{entityNo}/restaurant/{restaurantId}:
    get:
      tags:
        - OrderEntity
      summary: Get order entity by entity number and restaurant ID
      description: Retrieves a single order entity.
      operationId: getOrderEntityById
      parameters:
        - name: entityNo
          in: path
          description: Entity number/name
          required: true
          schema:
            type: string
          example: "Room 101"
        - name: restaurantId
          in: path
          description: Restaurant ID
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Successfully retrieved order entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEntity'
        '404':
          description: Order entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - OrderEntity
      summary: Delete an order entity
      description: Deletes an order entity.
      operationId: deleteOrderEntity
      parameters:
        - name: entityNo
          in: path
          description: Entity number/name to delete
          required: true
          schema:
            type: string
          example: "Room 101"
        - name: restaurantId
          in: path
          description: Restaurant ID
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Order entity deleted successfully
        '404':
          description: Order entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ===========================================================================
# Reusable Components
# ===========================================================================
components:
  schemas:
    # ---- Restaurant Schemas ----
    Restaurant:
      type: object
      description: Full restaurant representation (includes server-managed fields)
      properties:
        restaurantId:
          type: integer
          format: int64
          description: Unique auto-generated identifier
          example: 1
        restaurantName:
          type: string
          description: Name of the restaurant
          example: "The Grand Kitchen"
        gstin:
          type: string
          description: GSTIN (Goods and Services Tax Identification Number)
          example: "07AAAAA1111A1Z1"
        address:
          $ref: '#/components/schemas/Address'
        phoneNo:
          type: string
          description: Contact phone number
          example: "+1-555-123-4567"
        createdDate:
          type: string
          format: date-time
          description: Timestamp when the restaurant was created
          example: "2026-04-03T12:00:00.000+00:00"
        updatedDate:
          type: string
          format: date-time
          description: Timestamp when the restaurant was last updated
          example: "2026-04-03T12:30:00.000+00:00"
        status:
          type: string
          description: Current operational status
          example: "ACTIVE"
          enum:
            - ACTIVE
            - INACTIVE
            - TEMPORARILY_CLOSED
        email:
          type: string
          format: email
          description: Contact email address
          example: "info@grandkitchen.com"
        type:
          type: string
          description: Type/category of the restaurant
          example: "FINE_DINING"
          enum:
            - FINE_DINING
            - CASUAL_DINING
            - FAST_FOOD
            - CAFE
            - BUFFET
        establishmentType:
          type: string
          description: Type of the establishment
          example: "RESTAURANT"
          enum:
            - RESTAURANT
            - HOTEL
            - HOSPITAL
        orderEntityTypes:
          type: array
          description: Supported order entity types
          example: ["TABLE"]
          items:
            type: string
            enum:
              - TABLE
              - ROOM
              - BED
        razorpayKeyId:
          type: string
          description: The Razorpay Merchant Key ID
          example: "rzp_test_123456"
        razorpayKeySecret:
          type: string
          description: The Razorpay Merchant Key Secret
          example: "abcdef123456"

    RestaurantRequest:
      type: object
      description: Request body for creating or updating a restaurant
      required:
        - restaurantName
        - address
      properties:
        restaurantName:
          type: string
          description: Name of the restaurant
          example: "The Grand Kitchen"
        gstin:
          type: string
          description: GSTIN (Goods and Services Tax Identification Number)
          example: "07AAAAA1111A1Z1"
        address:
          $ref: '#/components/schemas/Address'
        phoneNo:
          type: string
          description: Contact phone number
          example: "+1-555-123-4567"
        status:
          type: string
          description: Current operational status
          example: "ACTIVE"
        email:
          type: string
          format: email
          description: Contact email address
          example: "info@grandkitchen.com"
        type:
          type: string
          description: Type/category of the restaurant
          example: "FINE_DINING"
        establishmentType:
          type: string
          description: Type of the establishment
          example: "RESTAURANT"
          enum:
            - RESTAURANT
            - HOTEL
            - HOSPITAL
        orderEntityTypes:
          type: array
          description: Supported order entity types
          example: ["TABLE"]
          items:
            type: string
            enum:
              - TABLE
              - ROOM
              - BED
        razorpayKeyId:
          type: string
          description: The Razorpay Merchant Key ID
          example: "rzp_test_123456"
        razorpayKeySecret:
          type: string
          description: The Razorpay Merchant Key Secret
          example: "abcdef123456"

    Address:
      type: object
      description: Structured physical address details
      required:
        - addressLine1
        - city
        - state
        - country
        - pincode
      properties:
        addressLine1:
          type: string
          description: Address line 1 (e.g. street, building name)
          example: "Flat 101, Building A"
        addressLine2:
          type: string
          description: Address line 2 (e.g. locality, area)
          example: "Sector 62"
        landmark:
          type: string
          description: A nearby landmark
          example: "Opposite Metro Station"
        city:
          type: string
          description: City name
          example: "Noida"
        state:
          type: string
          description: State name
          example: "Uttar Pradesh"
        country:
          type: string
          description: Country name
          example: "India"
        pincode:
          type: string
          description: Postal pincode / zip code
          example: "201301"


    # ---- Menu Schemas ----
    Menu:
      type: object
      description: Full menu item representation (includes server-managed fields)
      properties:
        menuId:
          type: integer
          format: int64
          description: Unique auto-generated identifier
          example: 1
        restaurantId:
          type: integer
          format: int64
          description: ID of the restaurant this menu item belongs to
          example: 1
        itemName:
          type: string
          description: Name of the menu item
          example: "Margherita Pizza"
        description:
          type: string
          description: Detailed description of the item
          example: "Classic pizza with fresh mozzarella, tomato sauce, and basil"
        price:
          type: number
          format: double
          description: Price of the item
          example: 14.99
        category:
          type: string
          description: Category the item belongs to
          example: "PIZZA"
        isAvailable:
          type: boolean
          description: Whether the item is currently available
          example: true
        createdDate:
          type: string
          format: date-time
          description: Timestamp when the item was created
          example: "2026-04-03T12:00:00.000+00:00"
        updatedDate:
          type: string
          format: date-time
          description: Timestamp when the item was last updated
          example: "2026-04-03T12:30:00.000+00:00"

    MenuRequest:
      type: object
      description: Request body for creating or updating a menu item
      required:
        - restaurantId
        - itemName
        - price
      properties:
        restaurantId:
          type: integer
          format: int64
          description: ID of the restaurant this menu item belongs to
          example: 1
        itemName:
          type: string
          description: Name of the menu item
          example: "Margherita Pizza"
        description:
          type: string
          description: Detailed description of the item
          example: "Classic pizza with fresh mozzarella, tomato sauce, and basil"
        price:
          type: number
          format: double
          description: Price of the item
          example: 14.99
        category:
          type: string
          description: Category the item belongs to
          example: "PIZZA"
        isAvailable:
          type: boolean
          description: Whether the item is currently available
          example: true

    # ---- Error Schema ----
    ErrorResponse:
      type: object
      description: Standard error response returned by the API
      properties:
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred
          example: "2026-04-03T12:00:00"
        status:
          type: integer
          description: HTTP status code
          example: 404
        error:
          type: string
          description: HTTP status reason phrase
          example: "Not Found"
        message:
          type: string
          description: Human-readable error message
          example: "Restaurant not found with id: 99"
        path:
          type: string
          description: The request path that caused the error
          example: "/restaurants/99"

    # ---- Order Entity Schemas ----
    OrderEntity:
      type: object
      description: Full representation of an order entity (Table, Room, Bed, etc.)
      properties:
        entityNo:
          type: string
          description: Unique identifier number/name for the entity
          example: "Room 101"
        restaurantId:
          type: integer
          format: int64
          description: Associated restaurant ID
          example: 1
        orderEntityType:
          type: string
          description: Type of the entity
          example: "ROOM"
          enum:
            - TABLE
            - ROOM
            - BED
        status:
          type: string
          description: Current availability status
          example: "ACTIVE"
        QRUrl:
          type: string
          description: URL pointing to QR code
          example: "http://qrcodes.com/room-101.png"
        createdDate:
          type: string
          format: date-time
          description: Created timestamp
        updatedDate:
          type: string
          format: date-time
          description: Last updated timestamp

    OrderEntityRequest:
      type: object
      description: Request body to create or update an order entity
      required:
        - entityNo
        - restaurantId
        - orderEntityType
      properties:
        entityNo:
          type: string
          description: Unique identifier number/name for the entity
          example: "Room 101"
        restaurantId:
          type: integer
          format: int64
          description: Associated restaurant ID
          example: 1
        orderEntityType:
          type: string
          description: Type of the entity
          example: "ROOM"
          enum:
            - TABLE
            - ROOM
            - BED
        status:
          type: string
          description: Current availability status
          example: "ACTIVE"
        QRUrl:
          type: string
          description: URL pointing to QR code
          example: "http://qrcodes.com/room-101.png"
